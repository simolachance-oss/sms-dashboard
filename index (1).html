function makeApi(url, key) {
  const base = url.replace(/\/$/, '');
  const h = { apikey: key, Authorization: 'Bearer ' + key, 'Content-Type': 'application/json' };
  return {
    rest: async (path, opts) => {
      opts = opts || {};
      const r = await fetch(base + '/rest/v1' + path, { ...opts, headers: { ...h, ...(opts.headers || {}) } });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    fn: async (name, body) => {
      const r = await fetch(base + '/functions/v1/' + name, { method: 'POST', headers: h, body: JSON.stringify(body || {}) });
      const text = await r.text();
      let data = null; try { data = JSON.parse(text); } catch {}
      if (!r.ok) throw new Error((data && data.error) || text || r.statusText);
      return data;
    },
    rpc: async (name, args) => {
      const r = await fetch(base + '/rest/v1/rpc/' + name, { method: 'POST', headers: h, body: JSON.stringify(args || {}) });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    insert: async (table, row) => {
      const r = await fetch(base + '/rest/v1/' + table, {
        method: 'POST',
        headers: { ...h, Prefer: 'return=representation' },
        body: JSON.stringify(row),
      });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    update: async (table, filter, patch) => {
      const r = await fetch(base + '/rest/v1/' + table + '?' + filter, {
        method: 'PATCH',
        headers: { ...h, Prefer: 'return=representation' },
        body: JSON.stringify(patch),
      });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
  };
}

function Card({ children, className }) {
  return <div className={'bg-white rounded-2xl shadow-sm border border-slate-200 ' + (className || '')}>{children}</div>;
}
function Button({ children, onClick, variant, disabled, className }) {
  const base = 'inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-medium text-sm transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ';
  const styles = {
    primary: 'bg-indigo-600 text-white hover:bg-indigo-700',
    secondary: 'bg-slate-100 text-slate-700 hover:bg-slate-200',
    danger: 'bg-rose-600 text-white hover:bg-rose-700',
    success: 'bg-emerald-600 text-white hover:bg-emerald-700',
  };
  return <button type="button" onClick={onClick} disabled={disabled} className={base + (styles[variant || 'primary']) + ' ' + (className || '')}>{children}</button>;
}
function Input({ value, onChange, placeholder, type, label, helper }) {
  return (<label className="block">
    {label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}
    <input type={type || 'text'} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base"/>
    {helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}
  </label>);
}
function TextArea({ value, onChange, placeholder, label, rows, helper }) {
  return (<label className="block">
    {label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}
    <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows || 3}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base resize-none font-mono"/>
    {helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}
  </label>);
}
function Badge({ children, color }) {
  const colors = {
    indigo: 'bg-indigo-100 text-indigo-700', emerald: 'bg-emerald-100 text-emerald-700',
    amber: 'bg-amber-100 text-amber-700', rose: 'bg-rose-100 text-rose-700',
    slate: 'bg-slate-100 text-slate-700',
  };
  return <span className={'inline-block px-2 py-0.5 rounded-md text-xs font-medium ' + (colors[color || 'slate'])}>{children}</span>;
}
function Toast({ msg, kind, onDone }) {
  useEffect(() => { if (msg) { const t = setTimeout(onDone, 4000); return () => clearTimeout(t); } }, [msg]);
  if (!msg) return null;
  const bg = kind === 'error' ? 'bg-rose-600' : kind === 'warn' ? 'bg-amber-600' : 'bg-emerald-600';
  return <div className={'fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-xl text-white shadow-lg ' + bg + ' max-w-md text-sm'}>{msg}</div>;
}
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (<div className="fixed inset-0 z-50 bg-slate-900/50 flex items-end sm:items-center justify-center" onClick={onClose}>
    <div className="bg-white w-full max-w-md max-h-[90vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl p-5" onClick={e => e.stopPropagation()}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-bold text-slate-900">{title}</h2>
        <button onClick={onClose} className="p-1 text-slate-400"><Icon d="M18 6L6 18 M6 6l12 12"/></button>
      </div>
      {children}
    </div>
  </div>);
}

function Login({ onConnect }) {
  const [key, setKey] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async () => {
    setErr(''); setBusy(true);
    try {
      const api = makeApi(SUPABASE_URL, key);
      await api.rest('/v_pipeline_stats?select=*&limit=1');
      onConnect({ url: SUPABASE_URL, key });
    } catch { setErr('Connexion échouée. Vérifie ta clé service_role.'); }
    finally { setBusy(false); }
  };
  return (<div className="min-h-screen flex items-center justify-center p-4">
    <Card className="w-full max-w-md p-6">
      <div className="flex items-center gap-3 mb-1">
        <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-6 h-6"/></div>
        <div><h1 className="text-xl font-bold text-slate-900">SMS Dashboard</h1><p className="text-xs text-slate-500">LeadsWebsite</p></div>
      </div>
      <p className="text-sm text-slate-600 mb-5 mt-3">Entre ta clé <code className="bg-slate-100 px-1 rounded">service_role</code>.</p>
      <div className="space-y-3">
        <Input label="Service Role Key" type="password" value={key} onChange={setKey} placeholder="eyJhbGc..." helper="Project Settings → API → service_role secret"/>
        {err && <div className="text-sm text-rose-600 bg-rose-50 px-3 py-2 rounded-lg">{err}</div>}
        <Button onClick={submit} disabled={busy || !key} className="w-full">{busy ? 'Connexion...' : 'Se connecter'}</Button>
      </div>
    </Card>
  </div>);
}

function fmtDate(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleString('fr-CA', { dateStyle: 'short', timeStyle: 'short' }); }
function fmtRelative(s) { if (!s) return '—'; const d = new Date(s); const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return 'maintenant'; if (diff < 3600) return Math.floor(diff/60) + ' min'; if (diff < 86400) return Math.floor(diff/3600) + ' h'; return Math.floor(diff/86400) + ' j'; }
function tierColor(t) { if (!t) return 'slate'; if (t.startsWith('A')) return 'rose'; if (t.startsWith('B')) return 'amber'; if (t.startsWith('C')) return 'indigo'; return 'slate'; }
function useToast() {
  const [t, setT] = useState({ msg: '', kind: 'ok' });
  return [t, (msg, kind) => setT({ msg, kind: kind || 'ok' }), () => setT({ msg: '', kind: 'ok' })];
}
function Row({ k, v }) { return <div className="flex items-center justify-between"><span className="text-slate-600">{k}</span>{v ? <IconCheck className="w-4 h-4 text-emerald-600"/> : <IconAlert className="w-4 h-4 text-rose-600"/>}</div>; }

function Dashboard({ api, toast }) {
  const [stats, setStats] = useState(null);
  const [quiet, setQuiet] = useState(null);
  const [health, setHealth] = useState(null);
  const [busy, setBusy] = useState(false);
  const [qs, setQs] = useState({ phone: '', body: '' });
  const [sending, setSending] = useState(false);
  const load = useCallback(async () => {
    try {
      const [s, q] = await Promise.all([
        api.rest('/v_pipeline_stats?select=*&limit=1'),
        api.rpc('is_quiet_hours', {}),
      ]);
      setStats(s[0]); setQuiet(q);
    } catch (e) { toast(e.message, 'error'); }
  }, [api]);
  useEffect(() => { load(); }, [load]);
  const runHealth = async () => { setBusy(true); try { setHealth(await api.fn('health-check')); } catch (e) { toast('Health-check: ' + e.message, 'error'); } finally { setBusy(false); } };
  const send = async () => {
    if (!qs.phone || !qs.body) return;
    setSending(true);
    try { await api.fn('send-sms', { phone_e164: qs.phone, body: qs.body }); toast('SMS envoyé'); setQs({ phone: '', body: '' }); load(); }
    catch (e) { toast('Erreur: ' + e.message, 'error'); }
    finally { setSending(false); }
  };
  if (!stats) return <div className="p-8 text-center text-slate-500">Chargement...</div>;
  return (<div className="space-y-4">
    <Card className={'p-4 flex items-center gap-3 ' + (quiet ? 'border-amber-300 bg-amber-50' : '')}>
      <div className={'w-10 h-10 rounded-full flex items-center justify-center ' + (quiet ? 'bg-amber-200 text-amber-800' : 'bg-emerald-100 text-emerald-700')}><IconClock/></div>
      <div className="flex-1">
        <p className="font-semibold text-slate-900">{quiet ? 'Quiet hours actives' : 'Fenêtre d envoi ouverte'}</p>
        <p className="text-xs text-slate-600">{quiet ? 'Bloqué par les réglages actuels' : 'SMS autorisés'}</p>
      </div>
    </Card>
    <div className="grid grid-cols-2 gap-3">
      <Card className="p-4"><p className="text-xs text-slate-500">Éligibles</p><p className="text-2xl font-bold text-slate-900">{stats.total_eligible}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Jamais contactés</p><p className="text-2xl font-bold text-indigo-600">{stats.never_contacted}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">En attente</p><p className="text-2xl font-bold text-amber-600">{stats.sent_awaiting_reply}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Ont répondu</p><p className="text-2xl font-bold text-emerald-600">{stats.replied}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Opt-outs</p><p className="text-2xl font-bold text-rose-600">{stats.opted_out}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Follow-ups dus</p><p className="text-2xl font-bold text-slate-900">{stats.follow_ups_due}</p></Card>
    </div>
    <Card className="p-4">
      <p className="font-semibold text-slate-900 mb-3">Activité 24h</p>
      <div className="flex gap-4">
        <div className="flex-1"><p className="text-xs text-slate-500">Envoyés</p><p className="text-xl font-bold">{stats.sent_last_24h}</p></div>
        <div className="flex-1"><p className="text-xs text-slate-500">Reçus</p><p className="text-xl font-bold">{stats.received_last_24h}</p></div>
      </div>
    </Card>
    <Card className="p-4">
      <p className="font-semibold text-slate-900 mb-3">Envoi rapide</p>
      <div className="space-y-3">
        <Input label="Numéro E.164" value={qs.phone} onChange={v => setQs({ ...qs, phone: v })} placeholder="+15145551234"/>
        <TextArea label="Message" value={qs.body} onChange={v => setQs({ ...qs, body: v })} placeholder="Bonjour..." rows={3}/>
        <Button onClick={send} disabled={sending || !qs.phone || !qs.body} className="w-full"><IconSend className="w-4 h-4"/>{sending ? 'Envoi...' : 'Envoyer'}</Button>
      </div>
    </Card>
    <Card className="p-4">
      <div className="flex items-center justify-between mb-3">
        <p className="font-semibold text-slate-900">Vérification système</p>
        <Button variant="secondary" onClick={runHealth} disabled={busy}><IconRefresh className="w-4 h-4"/>{busy ? '...' : 'Tester'}</Button>
      </div>
      {health && (<div className="space-y-1 text-sm">
        <Row k="Twilio SID" v={health.checks.twilio_account_sid}/>
        <Row k="Twilio Token" v={health.checks.twilio_auth_token}/>
        <Row k="Twilio From" v={health.checks.twilio_from}/>
        <Row k="DB accessible" v={health.checks.db_accessible}/>
        <Row k="API Twilio" v={health.checks.twilio_api_reachable}/>
        {health.checks.twilio_account_friendly_name && <p className="text-xs text-slate-500 mt-2">Compte: {health.checks.twilio_account_friendly_name}</p>}
      </div>)}
    </Card>
  </div>);
}

function LeadActions({ lead, onSend, onOptOut }) {
  const [body, setBody] = useState('');
  return (<div className="px-4 pb-4 border-t border-slate-100 pt-3 space-y-3">
    <TextArea value={body} onChange={setBody} placeholder="Message à envoyer..." rows={2}/>
    <div className="flex gap-2">
      <Button onClick={() => { onSend(lead, body); setBody(''); }} disabled={!body} className="flex-1"><IconSend className="w-4 h-4"/>Envoyer</Button>
      <Button variant="danger" onClick={() => onOptOut(lead)}><IconBan className="w-4 h-4"/></Button>
    </div>
  </div>);
}

function LeadsTab({ api, toast }) {
  const [filter, setFilter] = useState('contactable');
  const [search, setSearch] = useState('');
  const [items, setItems] = useState([]);
  const [page, setPage] = useState(0);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const PAGE_SIZE = 20;

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let path = '/leads?select=id,company_name,contact_name,phone_e164,priority_tier,pipeline_stage,reply_status,last_sent_at,overall_need_score';
      path += '&order=overall_need_score.desc.nullslast,last_sent_at.desc.nullslast';
      path += '&limit=' + PAGE_SIZE + '&offset=' + (page * PAGE_SIZE);
      path += '&phone_e164=like.%2B*';
      path += '&eligible_sms=eq.true';
      if (filter === 'never') path += '&last_sent_at=is.null';
      else if (filter === 'awaiting') path += '&last_sent_at=not.is.null&reply_status=is.null';
      else if (filter === 'replied') path += '&reply_status=eq.replied';
      else if (filter === 'hot') path += '&priority_tier=eq.A%20-%20Hot%20Lead';
      else if (filter === 'warm') path += '&priority_tier=eq.B%20-%20Warm%20Lead';
      if (filter !== 'replied') path += '&or=(reply_status.is.null,reply_status.eq.no_reply)';
      if (search) path += '&company_name=ilike.*' + encodeURIComponent(search) + '*';
      const list = await api.rest(path);
      setItems(list || []);
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }, [api, filter, search, page]);
  useEffect(() => { setPage(0); }, [filter, search]);
  useEffect(() => { load(); }, [load]);

  const sendOne = async (lead, body) => {
    if (!body) return;
    try { await api.fn('send-sms', { lead_id: lead.id, body }); toast('Envoyé à ' + (lead.company_name || lead.phone_e164)); load(); }
    catch (e) { toast('Erreur: ' + e.message, 'error'); }
  };
  const optOutOne = async (lead) => {
    if (!confirm('Marquer ' + (lead.company_name || lead.phone_e164) + ' comme opt-out?')) return;
    try { await api.rpc('add_manual_opt_out', { p_phone: lead.phone_e164, p_reason: 'manual_dashboard' }); toast('Opt-out ajouté'); load(); }
    catch (e) { toast(e.message, 'error'); }
  };
  const filters = [
    { id: 'contactable', label: 'Contactables' }, { id: 'never', label: 'Jamais contactés' },
    { id: 'awaiting', label: 'En attente' }, { id: 'replied', label: 'Ont répondu' },
    { id: 'hot', label: 'Hot' }, { id: 'warm', label: 'Warm' },
  ];

  return (<div className="space-y-4 relative">
    <Input value={search} onChange={setSearch} placeholder="Rechercher une entreprise..."/>
    <div className="flex gap-2 overflow-x-auto scrollbar-thin -mx-4 px-4 pb-1">
      {filters.map(f => (
        <button key={f.id} onClick={() => setFilter(f.id)}
          className={'shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition ' + (filter === f.id ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-700')}>{f.label}</button>
      ))}
    </div>
    {loading && <div className="p-8 text-center text-slate-500">Chargement...</div>}
    {!loading && items.length === 0 && <div className="p-8 text-center text-slate-500">Aucun lead</div>}
    <div className="space-y-2">
      {items.map(l => (
        <Card key={l.id} className="overflow-hidden">
          <button onClick={() => setExpanded(expanded === l.id ? null : l.id)} className="w-full text-left p-4 flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <p className="font-semibold text-slate-900 truncate">{l.company_name || '(Sans nom)'}</p>

function AddLeadModal({ open, onClose, api, toast, onAdded }) {
  const [form, setForm] = useState({ company_name: '', contact_name: '', phone_e164: '', email: '', personalized_hook: '', priority_tier: '' });
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (!form.phone_e164) return toast('Numéro requis', 'warn');
    if (!form.phone_e164.startsWith('+')) return toast('Numéro doit être au format E.164 (ex: +15145551234)', 'warn');
    setBusy(true);
    try {
      await api.insert('leads', {
        company_name: form.company_name || null,
        contact_name: form.contact_name || null,
        phone_e164: form.phone_e164,
        email: form.email || null,
        personalized_hook: form.personalized_hook || null,
        priority_tier: form.priority_tier || null,
        eligible_sms: true,
      });
      toast('Lead ajouté');
      setForm({ company_name: '', contact_name: '', phone_e164: '', email: '', personalized_hook: '', priority_tier: '' });
      onAdded();
    } catch (e) { toast('Erreur: ' + e.message, 'error'); }
    finally { setBusy(false); }
  };
  return (<Modal open={open} onClose={onClose} title="Nouveau lead">
    <div className="space-y-3">
      <Input label="Numéro E.164*" value={form.phone_e164} onChange={v => setForm({ ...form, phone_e164: v })} placeholder="+15145551234" helper="Format obligatoire avec +"/>
      <Input label="Nom de l'entreprise" value={form.company_name} onChange={v => setForm({ ...form, company_name: v })} placeholder="Acme Inc."/>
      <Input label="Nom du contact" value={form.contact_name} onChange={v => setForm({ ...form, contact_name: v })} placeholder="Marie Tremblay"/>
      <Input label="Email" value={form.email} onChange={v => setForm({ ...form, email: v })} placeholder="marie@acme.com" type="email"/>
      <Input label="Hook personnalisé" value={form.personalized_hook} onChange={v => setForm({ ...form, personalized_hook: v })} placeholder="votre site est en HTTP non sécurisé"/>
      <Input label="Tier (optionnel)" value={form.priority_tier} onChange={v => setForm({ ...form, priority_tier: v })} placeholder="A - Hot Lead"/>
      <div className="flex gap-2 pt-2">
        <Button variant="secondary" onClick={onClose} className="flex-1">Annuler</Button>
        <Button onClick={submit} disabled={busy} className="flex-1">{busy ? 'Ajout...' : 'Ajouter'}</Button>
      </div>
    </div>
  </Modal>);
}

function CreateCampaignModal({ open, onClose, api, toast, onCreated }) {
  const [form, setForm] = useState({ name: '', description: '', message_template: '', filter_priority_tier: '', filter_pipeline_stage: '', filter_only_uncontacted: true, filter_min_score: '', filter_max_score: '', filter_company_keyword: '' });
  const [preview, setPreview] = useState(null);
  const [busy, setBusy] = useState(false);
  const variables = ['{{company_name}}', '{{contact_name}}', '{{first_name}}', '{{personalized_hook}}', '{{site_notes}}', '{{priority_tier}}'];
  const insertVar = (v) => setForm({ ...form, message_template: form.message_template + v });
  const buildArgs = () => ({
    p_template: form.message_template,
    p_filter_priority_tier: form.filter_priority_tier || null,
    p_filter_pipeline_stage: form.filter_pipeline_stage || null,
    p_filter_only_uncontacted: form.filter_only_uncontacted,
    p_filter_min_score: form.filter_min_score ? parseInt(form.filter_min_score, 10) : null,
    p_filter_max_score: form.filter_max_score ? parseInt(form.filter_max_score, 10) : null,
    p_filter_company_keyword: form.filter_company_keyword || null,
  });
  const doPreview = async () => {
    if (!form.message_template) return toast('Template requis', 'warn');
    setBusy(true);
    try { setPreview(await api.rpc('preview_campaign', { ...buildArgs(), p_limit: 5 })); }
    catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const create = async () => {
    if (!form.name || !form.message_template) return toast('Nom et template requis', 'warn');
    setBusy(true);
    try {
      const inserted = await api.insert('campaigns', {
        name: form.name, description: form.description || null,
        message_template: form.message_template,
        filter_priority_tier: form.filter_priority_tier || null,
        filter_pipeline_stage: form.filter_pipeline_stage || null,
        filter_only_uncontacted: form.filter_only_uncontacted,
        filter_min_score: form.filter_min_score ? parseInt(form.filter_min_score, 10) : null,
        filter_max_score: form.filter_max_score ? parseInt(form.filter_max_score, 10) : null,
        filter_company_keyword: form.filter_company_keyword || null,
        status: 'draft',
      });
      toast('Campagne créée');
      onCreated();
    } catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  return (<Modal open={open} onClose={onClose} title="Nouvelle campagne">
    <div className="space-y-3">
      <Input label="Nom*" value={form.name} onChange={v => setForm({ ...form, name: v })} placeholder="Hot leads Avril 2026"/>
      <Input label="Description" value={form.description} onChange={v => setForm({ ...form, description: v })} placeholder="Premier contact pour les A-Hot Leads"/>
      <TextArea label="Message template*" value={form.message_template} onChange={v => setForm({ ...form, message_template: v })} rows={4} placeholder="Bonjour {{first_name}}, j'ai vu que {{personalized_hook}}. Curieux d'en discuter?" helper="Variables: voir les boutons ci-dessous"/>
      <div className="flex flex-wrap gap-1">{variables.map(v => <button key={v} onClick={() => insertVar(v)} className="text-xs px-2 py-1 bg-indigo-50 text-indigo-700 rounded">{v}</button>)}</div>
      <div className="text-xs font-medium text-slate-500 pt-2">Filtres</div>
      <Input label="Priority Tier" value={form.filter_priority_tier} onChange={v => setForm({ ...form, filter_priority_tier: v })} placeholder="A - Hot Lead"/>
      <Input label="Pipeline Stage" value={form.filter_pipeline_stage} onChange={v => setForm({ ...form, filter_pipeline_stage: v })} placeholder="Vide pour tous"/>
      <div className="grid grid-cols-2 gap-2">
        <Input label="Score min" value={form.filter_min_score} onChange={v => setForm({ ...form, filter_min_score: v })} type="number"/>
        <Input label="Score max" value={form.filter_max_score} onChange={v => setForm({ ...form, filter_max_score: v })} type="number"/>
      </div>
      <Input label="Mot-clé dans le nom (opt.)" value={form.filter_company_keyword} onChange={v => setForm({ ...form, filter_company_keyword: v })}/>
      <label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={form.filter_only_uncontacted} onChange={e => setForm({ ...form, filter_only_uncontacted: e.target.checked })}/>Seulement leads jamais contactés</label>
      <Button variant="secondary" onClick={doPreview} disabled={busy} className="w-full"><IconEye className="w-4 h-4"/>{busy ? '...' : 'Aperçu'}</Button>
      {preview && preview.length > 0 && (<Card className="p-3 bg-slate-50"><p className="text-sm font-semibold mb-2">{preview[0].total_matching} leads correspondent</p><div className="space-y-2 max-h-48 overflow-y-auto">{preview.map(p => (<div key={p.lead_id} className="text-xs bg-white p-2 rounded"><p className="font-medium text-slate-900">{p.company_name || '—'} ({p.rendered_length} car.)</p><p className="text-slate-600 mt-1 whitespace-pre-wrap">{p.rendered_body}</p></div>))}</div></Card>)}
      {preview && preview.length === 0 && <div className="text-sm text-amber-700 bg-amber-50 p-2 rounded">Aucun lead correspondant</div>}
      <div className="flex gap-2 pt-2">
        <Button variant="secondary" onClick={onClose} className="flex-1">Annuler</Button>
        <Button onClick={create} disabled={busy} className="flex-1">Créer</Button>
      </div>
    </div>
  </Modal>);
}

function CampaignDetail({ campaign, api, toast, onBack }) {
  const [c, setC] = useState(campaign);
  const [busy, setBusy] = useState(false);
  const reload = async () => {
    try { const r = await api.rest('/v_campaigns_overview?id=eq.' + c.id + '&select=*&limit=1'); if (r && r[0]) setC(r[0]); }
    catch (e) { toast(e.message, 'error'); }
  };
  const materialize = async () => {
    setBusy(true);
    try { const n = await api.rpc('materialize_campaign_recipients', { p_campaign_id: c.id }); toast(n + ' recipients prêts'); reload(); }
    catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const launch = async (dryRun) => {
    setBusy(true);
    try {
      const r = await api.fn('process-campaign', { campaign_id: c.id, limit: 50, dry_run: dryRun });
      if (dryRun) toast('Dry-run: ' + (r.would_process || 0) + ' à traiter');
      else toast('Envoyés: ' + (r.sent_ok || 0) + ' / Skipped: ' + (r.skipped || 0) + ' / Erreurs: ' + (r.errors || 0));
      reload();
    } catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const archive = async () => {
    if (!confirm('Archiver cette campagne?')) return;
    try { await api.update('campaigns', 'id=eq.' + c.id, { status: 'archived' }); toast('Archivée'); onBack(); }
    catch (e) { toast(e.message, 'error'); }
  };
  return (<div className="space-y-4">
    <button onClick={onBack} className="flex items-center gap-2 text-sm text-slate-600"><IconArrowLeft className="w-4 h-4"/>Retour</button>
    <Card className="p-4">
      <div className="flex items-center justify-between mb-2"><h2 className="text-lg font-bold">{c.name}</h2><Badge color={c.status === 'running' ? 'amber' : c.status === 'completed' ? 'emerald' : c.status === 'ready' ? 'indigo' : 'slate'}>{c.status}</Badge></div>
      {c.description && <p className="text-sm text-slate-600 mb-3">{c.description}</p>}
      <div className="bg-slate-50 p-3 rounded-lg text-sm font-mono whitespace-pre-wrap">{c.message_template}</div>
    </Card>
    <div className="grid grid-cols-2 gap-2">
      <Card className="p-3"><p className="text-xs text-slate-500">Ciblés</p><p className="text-xl font-bold">{c.total_targeted}</p></Card>
      <Card className="p-3"><p className="text-xs text-slate-500">En attente</p><p className="text-xl font-bold text-indigo-600">{c.pending}</p></Card>
      <Card className="p-3"><p className="text-xs text-slate-500">Envoyés</p><p className="text-xl font-bold text-emerald-600">{c.sent}</p></Card>
      <Card className="p-3"><p className="text-xs text-slate-500">Échecs</p><p className="text-xl font-bold text-rose-600">{c.failed}</p></Card>
    </div>
    <Card className="p-4 space-y-2">
      <p className="font-semibold mb-2">Actions</p>
      {c.status === 'draft' && <Button onClick={materialize} disabled={busy} className="w-full">{busy ? '...' : 'Préparer (matérialiser les recipients)'}</Button>}
      {(c.status === 'ready' || c.status === 'running') && c.pending > 0 && (<>
        <Button variant="secondary" onClick={() => launch(true)} disabled={busy} className="w-full">Dry-run</Button>
        <Button variant="success" onClick={() => launch(false)} disabled={busy} className="w-full"><IconPlay className="w-4 h-4"/>{busy ? 'Envoi...' : 'Envoyer batch (50 max)'}</Button>
      </>)}
      {c.status === 'completed' && <p className="text-sm text-emerald-700 bg-emerald-50 p-2 rounded">Campagne terminée</p>}
      {c.status !== 'archived' && <Button variant="danger" onClick={archive} className="w-full">Archiver</Button>}
    </Card>
  </div>);
}

function ConversationsTab({ api, toast }) {
  const [phone, setPhone] = useState('');
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [reply, setReply] = useState('');
  const [sending, setSending] = useState(false);
  const [searched, setSearched] = useState(false);
  const search = async () => {
    if (!phone) return;
    setLoading(true); setSearched(true);
    try { setMessages(await api.rest('/messages_log?phone_e164=eq.' + encodeURIComponent(phone) + '&order=timestamp.asc&limit=200') || []); }
    catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };
  const sendReply = async () => {
    if (!reply || !phone) return;
    setSending(true);
    try { await api.fn('send-sms', { phone_e164: phone, body: reply }); setReply(''); await search(); toast('Envoyé'); }
    catch (e) { toast(e.message, 'error'); }
    finally { setSending(false); }
  };
  return (<div className="space-y-4">
    <Card className="p-4"><div className="flex gap-2"><div className="flex-1"><Input value={phone} onChange={setPhone} placeholder="+15145551234"/></div><Button onClick={search} disabled={loading || !phone}>Chercher</Button></div></Card>
    {loading && <div className="p-8 text-center text-slate-500">Chargement...</div>}
    {!loading && messages.length > 0 && (<><div className="space-y-2">{messages.map(m => (<div key={m.id} className={'flex ' + (m.direction === 'outbound' ? 'justify-end' : 'justify-start')}><div className={'max-w-xs px-4 py-2 rounded-2xl ' + (m.direction === 'outbound' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200')}><p className="text-sm whitespace-pre-wrap">{m.body}</p><p className={'text-xs mt-1 ' + (m.direction === 'outbound' ? 'text-indigo-200' : 'text-slate-400')}>{fmtDate(m.timestamp)} · {m.status || '—'}</p></div></div>))}</div><Card className="p-3"><div className="flex gap-2"><div className="flex-1"><Input value={reply} onChange={setReply} placeholder="Réponse..."/></div><Button onClick={sendReply} disabled={sending || !reply}><IconSend className="w-4 h-4"/></Button></div></Card></>)}
    {!loading && searched && phone && messages.length === 0 && <Card className="p-8 text-center text-slate-500">Aucun message pour ce numéro</Card>}
  </div>);
}

function SettingsPage({ api, toast, onBack }) {
  const [settings, setSettings] = useState({});
  const [busy, setBusy] = useState(false);
  const load = useCallback(async () => {
    try {
      const r = await api.rest('/app_settings?select=*&order=key.asc');
      const map = {};
      (r || []).forEach(s => { map[s.key] = s; });
      setSettings(map);
    } catch (e) { toast(e.message, 'error'); }
  }, [api]);
  useEffect(() => { load(); }, [load]);
  const save = async (key, value) => {
    setBusy(true);
    try {
      await api.rpc('set_setting', { p_key: key, p_value: value });
      toast('Réglage sauvegardé');
      load();
    } catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const SettingItem = ({ k, label, hint, type, parser }) => {
    const cur = settings[k];
    const [v, setV] = useState('');
    useEffect(() => { if (cur) setV(typeof cur.value === 'string' ? cur.value : JSON.stringify(cur.value)); }, [cur]);
    if (!cur) return null;
    return (<Card className="p-4 space-y-2">
      <div><p className="font-semibold text-sm">{label}</p><p className="text-xs text-slate-500">{hint || cur.description}</p></div>
      <div className="flex gap-2">
        <input type={type || 'text'} value={v} onChange={e => setV(e.target.value)} className="flex-1 px-3 py-2 rounded-lg border border-slate-300 focus:border-indigo-500 outline-none text-sm"/>
        <Button onClick={() => save(k, parser ? parser(v) : v)} disabled={busy}>OK</Button>
      </div>
    </Card>);
  };
  return (<div className="space-y-4">
    <button onClick={onBack} className="flex items-center gap-2 text-sm text-slate-600"><IconArrowLeft className="w-4 h-4"/>Retour</button>
    <h2 className="text-xl font-bold">Réglages</h2>
    <p className="text-sm text-slate-600">Ces réglages s'appliquent immédiatement à toutes les fonctions d'envoi.</p>
    <SettingItem k="quiet_hours_start" label="Début de la fenêtre d'envoi" hint="Heure (0-23) en format 24h Montréal" type="number" parser={v => parseInt(v, 10)}/>
    <SettingItem k="quiet_hours_end" label="Fin de la fenêtre d'envoi" hint="Heure (0-23) en format 24h Montréal" type="number" parser={v => parseInt(v, 10)}/>
    <SettingItem k="quiet_hours_tz" label="Fuseau horaire" hint="Ex: America/Montreal, America/New_York" parser={v => v}/>
    <SettingItem k="daily_cap_per_number" label="Plafond quotidien" hint="Max SMS par numéro par tranche de 24h (1 = 1 SMS/jour max)" type="number" parser={v => parseInt(v, 10)}/>
    <SettingItem k="send_throttle_ms" label="Délai entre envois (ms)" hint=">=1000 pour Twilio long-code (1 SMS/sec max)" type="number" parser={v => parseInt(v, 10)}/>
  </div>);
}

function BottomNav({ tab, onChange }) {
  const tabs = [
    { id: 'dashboard', label: 'Accueil', Icon: IconHome },
    { id: 'leads', label: 'Leads', Icon: IconUsers },
    { id: 'campaigns', label: 'Campagnes', Icon: IconMegaphone },
    { id: 'conversations', label: 'Convo', Icon: IconChat },
    { id: 'optouts', label: 'Opt-out', Icon: IconBan },
    { id: 'activity', label: 'Logs', Icon: IconActivity },
  ];
  return (<nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 py-2 z-30" style={{ paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
    <div className="max-w-4xl mx-auto flex justify-around">
      {tabs.map(t => (<button key={t.id} onClick={() => onChange(t.id)} className={'flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg transition ' + (tab === t.id ? 'text-indigo-600' : 'text-slate-500')}><t.Icon className="w-5 h-5"/><span className="text-xs font-medium">{t.label}</span></button>))}
    </div>
  </nav>);
}

function App() {
  const [config, setConfig] = useState(() => { try { const s = sessionStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; } });
  const [tab, setTab] = useState('dashboard');
  const [showSettings, setShowSettings] = useState(false);
  const [t, showToast, clearToast] = useToast();
  const api = useMemo(() => config ? makeApi(config.url, config.key) : null, [config]);
  const onConnect = (cfg) => { try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch {} setConfig(cfg); };
  const onDisconnect = () => { try { sessionStorage.removeItem(STORAGE_KEY); } catch {} setConfig(null); };
  if (!config) return <><Login onConnect={onConnect}/><Toast {...t} onDone={clearToast}/></>;
  return (<div className="min-h-screen pb-24">
    <Toast {...t} onDone={clearToast}/>
    <header className="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-20">
      <div className="max-w-4xl mx-auto flex items-center justify-between">
        <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-4 h-4"/></div><h1 className="font-bold text-slate-900">SMS Dashboard</h1></div>
        <div className="flex items-center gap-1">
          <button onClick={() => setShowSettings(true)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><IconSettings className="w-5 h-5"/></button>
          <button onClick={onDisconnect} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><IconLogOut className="w-5 h-5"/></button>
        </div>
      </div>
    </header>
    <main className="max-w-4xl mx-auto p-4">
      {showSettings ? <SettingsPage api={api} toast={showToast} onBack={() => setShowSettings(false)}/> : (<>
        {tab === 'dashboard' && <Dashboard api={api} toast={showToast}/>}
        {tab === 'leads' && <LeadsTab api={api} toast={showToast}/>}
        {tab === 'campaigns' && <CampaignsTab api={api} toast={showToast}/>}
        {tab === 'conversations' && <ConversationsTab api={api} toast={showToast}/>}
        {tab === 'optouts' && <OptOutsTab api={api} toast={showToast}/>}
        {tab === 'activity' && <ActivityTab api={api} toast={showToast}/>}
      </>)}
    </main>
    {!showSettings && <BottomNav tab={tab} onChange={setTab}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
