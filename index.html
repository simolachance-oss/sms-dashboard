<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>SMS Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .scrollbar-thin::-webkit-scrollbar { height: 4px; width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 2px; }

<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

// URL Supabase hardcodée pour fonctionner depuis n'importe quel hosting
const SUPABASE_URL = 'https://mzrdeiasmvhjqslqeoko.supabase.co';
const STORAGE_KEY = 'sms_dashboard_v1';

function makeApi(url, key) {
  const base = url.replace(/\/$/, '');
  const h = { apikey: key, Authorization: 'Bearer ' + key, 'Content-Type': 'application/json' };
  return {
    rest: async (path, opts) => {
      opts = opts || {};
      const r = await fetch(base + '/rest/v1' + path, { ...opts, headers: { ...h, ...(opts.headers || {}) } });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    fn: async (name, body) => {
      const r = await fetch(base + '/functions/v1/' + name, { method: 'POST', headers: h, body: JSON.stringify(body || {}) });
      const text = await r.text();
      let data = null; try { data = JSON.parse(text); } catch {}
      if (!r.ok) throw new Error((data && data.error) || text || r.statusText);
      return data;
    },
    rpc: async (name, args) => {
      const r = await fetch(base + '/rest/v1/rpc/' + name, { method: 'POST', headers: h, body: JSON.stringify(args || {}) });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
  };
}

const Icon = ({ d, className }) => (
  <svg className={className || 'w-5 h-5'} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
);
const IconHome = (p) => <Icon {...p} d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>;
const IconUsers = (p) => <Icon {...p} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/>;
const IconClock = (p) => <Icon {...p} d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2"/>;
const IconChat = (p) => <Icon {...p} d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>;
const IconBan = (p) => <Icon {...p} d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M4.93 4.93l14.14 14.14"/>;
const IconActivity = (p) => <Icon {...p} d="M22 12h-4l-3 9L9 3l-3 9H2"/>;
const IconSend = (p) => <Icon {...p} d="M22 2L11 13 M22 2l-7 20-4-9-9-4z"/>;
const IconLogOut = (p) => <Icon {...p} d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9"/>;
const IconRefresh = (p) => <Icon {...p} d="M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>;
const IconTrash = (p) => <Icon {...p} d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>;
const IconCheck = (p) => <Icon {...p} d="M20 6L9 17l-5-5"/>;
const IconAlert = (p) => <Icon {...p} d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01"/>;
const IconChevron = (p) => <Icon {...p} d="M9 18l6-6-6-6"/>;

function Card({ children, className }) {
  return <div className={'bg-white rounded-2xl shadow-sm border border-slate-200 ' + (className || '')}>{children}</div>;
}
function Button({ children, onClick, variant, disabled, className }) {
  const base = 'inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-medium text-sm transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ';
  const styles = {
    primary: 'bg-indigo-600 text-white hover:bg-indigo-700',
    secondary: 'bg-slate-100 text-slate-700 hover:bg-slate-200',
    danger: 'bg-rose-600 text-white hover:bg-rose-700',
  };
  return <button type="button" onClick={onClick} disabled={disabled} className={base + (styles[variant || 'primary']) + ' ' + (className || '')}>{children}</button>;
}
function Input({ value, onChange, placeholder, type, label, helper }) {
  return (<label className="block">
    {label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}
    <input type={type || 'text'} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base"/>
    {helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}
  </label>);
}
function TextArea({ value, onChange, placeholder, label, rows }) {
  return (<label className="block">
    {label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}
    <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows || 3}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base resize-none"/>
  </label>);
}
function Badge({ children, color }) {
  const colors = {
    indigo: 'bg-indigo-100 text-indigo-700', emerald: 'bg-emerald-100 text-emerald-700',
    amber: 'bg-amber-100 text-amber-700', rose: 'bg-rose-100 text-rose-700',
    slate: 'bg-slate-100 text-slate-700',
  };
  return <span className={'inline-block px-2 py-0.5 rounded-md text-xs font-medium ' + (colors[color || 'slate'])}>{children}</span>;
}
function Toast({ msg, kind, onDone }) {
  useEffect(() => { if (msg) { const t = setTimeout(onDone, 4000); return () => clearTimeout(t); } }, [msg]);
  if (!msg) return null;
  const bg = kind === 'error' ? 'bg-rose-600' : kind === 'warn' ? 'bg-amber-600' : 'bg-emerald-600';
  return <div className={'fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-xl text-white shadow-lg ' + bg + ' max-w-md text-sm'}>{msg}</div>;
}

function Login({ onConnect }) {
  const [key, setKey] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async () => {
    setErr(''); setBusy(true);
    try {
      const api = makeApi(SUPABASE_URL, key);
      await api.rest('/v_pipeline_stats?select=*&limit=1');
      onConnect({ url: SUPABASE_URL, key });
    } catch (e) { setErr('Connexion échouée. Vérifie ta clé service_role.'); }
    finally { setBusy(false); }
  };
  return (<div className="min-h-screen flex items-center justify-center p-4">
    <Card className="w-full max-w-md p-6">
      <div className="flex items-center gap-3 mb-1">
        <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-6 h-6"/></div>
        <div><h1 className="text-xl font-bold text-slate-900">SMS Dashboard</h1><p className="text-xs text-slate-500">LeadsWebsite</p></div>
      </div>
      <p className="text-sm text-slate-600 mb-5 mt-3">Entre ta clé <code className="bg-slate-100 px-1 rounded">service_role</code>. Elle reste dans ton navigateur.</p>
      <div className="space-y-3">
        <Input label="Service Role Key" type="password" value={key} onChange={setKey} placeholder="eyJhbGc..." helper="Project Settings → API → service_role secret"/>
        {err && <div className="text-sm text-rose-600 bg-rose-50 px-3 py-2 rounded-lg">{err}</div>}
        <Button onClick={submit} disabled={busy || !key} className="w-full">{busy ? 'Connexion...' : 'Se connecter'}</Button>
      </div>
      <p className="text-xs text-slate-400 mt-4 text-center">Connecté à {SUPABASE_URL.replace('https://', '').slice(0, 30)}...</p>
    </Card>
  </div>);
}

function fmtDate(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleString('fr-CA', { dateStyle: 'short', timeStyle: 'short' }); }
function fmtRelative(s) { if (!s) return '—'; const d = new Date(s); const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return 'maintenant'; if (diff < 3600) return Math.floor(diff/60) + ' min'; if (diff < 86400) return Math.floor(diff/3600) + ' h'; return Math.floor(diff/86400) + ' j'; }
function tierColor(t) { if (!t) return 'slate'; if (t.startsWith('A')) return 'rose'; if (t.startsWith('B')) return 'amber'; if (t.startsWith('C')) return 'indigo'; return 'slate'; }
function useToast() {
  const [t, setT] = useState({ msg: '', kind: 'ok' });
  return [t, (msg, kind) => setT({ msg, kind: kind || 'ok' }), () => setT({ msg: '', kind: 'ok' })];
}

function Row({ k, v }) { return <div className="flex items-center justify-between"><span className="text-slate-600">{k}</span>{v ? <IconCheck className="w-4 h-4 text-emerald-600"/> : <IconAlert className="w-4 h-4 text-rose-600"/>}</div>; }

function Dashboard({ api, toast }) {
  const [stats, setStats] = useState(null);
  const [quiet, setQuiet] = useState(null);
  const [health, setHealth] = useState(null);
  const [busy, setBusy] = useState(false);
  const [qs, setQs] = useState({ phone: '', body: '' });
  const [sending, setSending] = useState(false);

  const load = useCallback(async () => {
    try {
      const [s, q] = await Promise.all([
        api.rest('/v_pipeline_stats?select=*&limit=1'),
        api.rpc('is_quiet_hours', {}),
      ]);
      setStats(s[0]); setQuiet(q);
    } catch (e) { toast(e.message, 'error'); }
  }, [api]);
  useEffect(() => { load(); }, [load]);

  const runHealth = async () => {
    setBusy(true);
    try { setHealth(await api.fn('health-check')); }
    catch (e) { toast('Health-check: ' + e.message, 'error'); }
    finally { setBusy(false); }
  };
  const send = async () => {
    if (!qs.phone || !qs.body) return;
    setSending(true);
    try { await api.fn('send-sms', { phone_e164: qs.phone, body: qs.body }); toast('SMS envoyé'); setQs({ phone: '', body: '' }); load(); }
    catch (e) { toast('Erreur: ' + e.message, 'error'); }
    finally { setSending(false); }
  };

  if (!stats) return <div className="p-8 text-center text-slate-500">Chargement...</div>;

  return (<div className="space-y-4">
    <Card className={'p-4 flex items-center gap-3 ' + (quiet ? 'border-amber-300 bg-amber-50' : '')}>
      <div className={'w-10 h-10 rounded-full flex items-center justify-center ' + (quiet ? 'bg-amber-200 text-amber-800' : 'bg-emerald-100 text-emerald-700')}><IconClock/></div>
      <div className="flex-1">
        <p className="font-semibold text-slate-900">{quiet ? 'Quiet hours actives' : 'Fenêtre d envoi ouverte'}</p>
        <p className="text-xs text-slate-600">{quiet ? 'Bloqué (21h–8h Montréal)' : 'SMS autorisés (8h–21h Montréal)'}</p>
      </div>
    </Card>
    <div className="grid grid-cols-2 gap-3">
      <Card className="p-4"><p className="text-xs text-slate-500">Éligibles</p><p className="text-2xl font-bold text-slate-900">{stats.total_eligible}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Jamais contactés</p><p className="text-2xl font-bold text-indigo-600">{stats.never_contacted}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">En attente</p><p className="text-2xl font-bold text-amber-600">{stats.sent_awaiting_reply}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Ont répondu</p><p className="text-2xl font-bold text-emerald-600">{stats.replied}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Opt-outs</p><p className="text-2xl font-bold text-rose-600">{stats.opted_out}</p></Card>
      <Card className="p-4"><p className="text-xs text-slate-500">Follow-ups dus</p><p className="text-2xl font-bold text-slate-900">{stats.follow_ups_due}</p></Card>
    </div>
    <Card className="p-4">
      <p className="font-semibold text-slate-900 mb-3">Activité 24h</p>
      <div className="flex gap-4">
        <div className="flex-1"><p className="text-xs text-slate-500">Envoyés</p><p className="text-xl font-bold">{stats.sent_last_24h}</p></div>
        <div className="flex-1"><p className="text-xs text-slate-500">Reçus</p><p className="text-xl font-bold">{stats.received_last_24h}</p></div>
      </div>
    </Card>
    <Card className="p-4">
      <p className="font-semibold text-slate-900 mb-3">Envoi rapide</p>
      <div className="space-y-3">
        <Input label="Numéro E.164" value={qs.phone} onChange={v => setQs({ ...qs, phone: v })} placeholder="+15145551234"/>
        <TextArea label="Message" value={qs.body} onChange={v => setQs({ ...qs, body: v })} placeholder="Bonjour..." rows={3}/>
        <Button onClick={send} disabled={sending || !qs.phone || !qs.body} className="w-full"><IconSend className="w-4 h-4"/>{sending ? 'Envoi...' : 'Envoyer'}</Button>
      </div>
    </Card>
    <Card className="p-4">
      <div className="flex items-center justify-between mb-3">
        <p className="font-semibold text-slate-900">Vérification système</p>
        <Button variant="secondary" onClick={runHealth} disabled={busy}><IconRefresh className="w-4 h-4"/>{busy ? '...' : 'Tester'}</Button>
      </div>
      {health && (<div className="space-y-1 text-sm">
        <Row k="Twilio SID" v={health.checks.twilio_account_sid}/>
        <Row k="Twilio Token" v={health.checks.twilio_auth_token}/>
        <Row k="Twilio From" v={health.checks.twilio_from}/>
        <Row k="DB accessible" v={health.checks.db_accessible}/>
        <Row k="API Twilio" v={health.checks.twilio_api_reachable}/>
        {health.checks.twilio_account_friendly_name && <p className="text-xs text-slate-500 mt-2">Compte: {health.checks.twilio_account_friendly_name}</p>}
      </div>)}
    </Card>
  </div>);
}

function LeadActions({ lead, onSend, onOptOut }) {
  const [body, setBody] = useState('');
  return (<div className="px-4 pb-4 border-t border-slate-100 pt-3 space-y-3">
    <TextArea value={body} onChange={setBody} placeholder="Message à envoyer..." rows={2}/>
    <div className="flex gap-2">
      <Button onClick={() => { onSend(lead, body); setBody(''); }} disabled={!body} className="flex-1"><IconSend className="w-4 h-4"/>Envoyer</Button>
      <Button variant="danger" onClick={() => onOptOut(lead)}><IconBan className="w-4 h-4"/></Button>
    </div>
  </div>);
}

function LeadsTab({ api, toast }) {
  const [filter, setFilter] = useState('contactable');
  const [search, setSearch] = useState('');
  const [items, setItems] = useState([]);
  const [page, setPage] = useState(0);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const PAGE_SIZE = 20;

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let path = '/leads?select=id,company_name,contact_name,phone_e164,priority_tier,pipeline_stage,reply_status,last_sent_at,overall_need_score';
      path += '&order=overall_need_score.desc.nullslast,last_sent_at.desc.nullslast';
      path += '&limit=' + PAGE_SIZE + '&offset=' + (page * PAGE_SIZE);
      path += '&phone_e164=like.%2B*';
      path += '&eligible_sms=eq.true';
      if (filter === 'never') path += '&last_sent_at=is.null';
      else if (filter === 'awaiting') path += '&last_sent_at=not.is.null&reply_status=is.null';
      else if (filter === 'replied') path += '&reply_status=eq.replied';
      else if (filter === 'hot') path += '&priority_tier=eq.A%20-%20Hot%20Lead';
      else if (filter === 'warm') path += '&priority_tier=eq.B%20-%20Warm%20Lead';
      if (filter !== 'replied') path += '&or=(reply_status.is.null,reply_status.eq.no_reply)';
      if (search) path += '&company_name=ilike.*' + encodeURIComponent(search) + '*';
      const list = await api.rest(path);
      setItems(list || []);
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }, [api, filter, search, page]);

  useEffect(() => { setPage(0); }, [filter, search]);
  useEffect(() => { load(); }, [load]);

  const sendOne = async (lead, body) => {
    if (!body) return;
    try { await api.fn('send-sms', { lead_id: lead.id, body }); toast('Envoyé à ' + (lead.company_name || lead.phone_e164)); load(); }
    catch (e) { toast('Erreur: ' + e.message, 'error'); }
  };
  const optOutOne = async (lead) => {
    if (!confirm('Marquer ' + (lead.company_name || lead.phone_e164) + ' comme opt-out?')) return;
    try { await api.rpc('add_manual_opt_out', { p_phone: lead.phone_e164, p_reason: 'manual_dashboard' }); toast('Opt-out ajouté'); load(); }
    catch (e) { toast(e.message, 'error'); }
  };

  const filters = [
    { id: 'contactable', label: 'Contactables' },
    { id: 'never', label: 'Jamais contactés' },
    { id: 'awaiting', label: 'En attente' },
    { id: 'replied', label: 'Ont répondu' },
    { id: 'hot', label: 'Hot' },
    { id: 'warm', label: 'Warm' },
  ];

  return (<div className="space-y-4">
    <Input value={search} onChange={setSearch} placeholder="Rechercher une entreprise..."/>
    <div className="flex gap-2 overflow-x-auto scrollbar-thin -mx-4 px-4 pb-1">
      {filters.map(f => (
        <button key={f.id} onClick={() => setFilter(f.id)}
          className={'shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition ' + (filter === f.id ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-700')}>{f.label}</button>
      ))}
    </div>
    {loading && <div className="p-8 text-center text-slate-500">Chargement...</div>}
    {!loading && items.length === 0 && <div className="p-8 text-center text-slate-500">Aucun lead</div>}
    <div className="space-y-2">
      {items.map(l => (
        <Card key={l.id} className="overflow-hidden">
          <button onClick={() => setExpanded(expanded === l.id ? null : l.id)} className="w-full text-left p-4 flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <p className="font-semibold text-slate-900 truncate">{l.company_name || '(Sans nom)'}</p>
              <p className="text-sm text-slate-500 truncate">{l.contact_name || '—'} · {l.phone_e164}</p>
              <div className="flex flex-wrap gap-1 mt-1.5">
                {l.priority_tier && <Badge color={tierColor(l.priority_tier)}>{l.priority_tier.split(' - ')[0]}</Badge>}
                {l.pipeline_stage && <Badge color="slate">{l.pipeline_stage}</Badge>}
                {l.last_sent_at && <Badge color="slate">Envoyé {fmtRelative(l.last_sent_at)}</Badge>}
                {l.reply_status === 'replied' && <Badge color="emerald">A répondu</Badge>}
              </div>
            </div>
            <IconChevron className={'w-5 h-5 text-slate-400 transition shrink-0 ' + (expanded === l.id ? 'rotate-90' : '')}/>
          </button>
          {expanded === l.id && <LeadActions lead={l} onSend={sendOne} onOptOut={optOutOne}/>}
        </Card>
      ))}
    </div>
    <div className="flex items-center justify-between">
      <Button variant="secondary" onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0 || loading}>Précédent</Button>
      <span className="text-sm text-slate-500">Page {page + 1}</span>
      <Button variant="secondary" onClick={() => setPage(page + 1)} disabled={items.length < PAGE_SIZE || loading}>Suivant</Button>
    </div>
  </div>);
}

function FollowUpsTab({ api, toast }) {
  const [form, setForm] = useState({ step: '1', delay: '3', template: '', tier: '', stage: '', minDays: '3' });
  const [preview, setPreview] = useState(null);
  const [pending, setPending] = useState([]);
  const [busy, setBusy] = useState(false);
  const [processBusy, setProcessBusy] = useState(false);

  const loadPending = useCallback(async () => {
    try { setPending(await api.rest('/v_follow_ups_overview?status=in.(pending,due)&order=scheduled_at.asc&limit=50') || []); }
    catch (e) { toast(e.message, 'error'); }
  }, [api]);
  useEffect(() => { loadPending(); }, [loadPending]);

  const args = () => ({
    p_step: parseInt(form.step, 10),
    p_delay: form.delay + ' days',
    p_message_template: form.template,
    p_priority_tier: form.tier || null,
    p_pipeline_stage: form.stage || null,
    p_min_days_since_last_send: parseInt(form.minDays, 10),
  });

  const dryRun = async () => {
    if (!form.template) return toast('Template requis', 'warn');
    setBusy(true);
    try { setPreview(await api.rpc('plan_follow_ups', { ...args(), p_dry_run: true })); }
    catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const commit = async () => {
    if (!preview || preview.length === 0) return;
    if (!confirm('Planifier ' + preview.length + ' follow-ups?')) return;
    setBusy(true);
    try { await api.rpc('plan_follow_ups', { ...args(), p_dry_run: false }); toast(preview.length + ' follow-ups planifiés'); setPreview(null); loadPending(); }
    catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const processNow = async () => {
    setProcessBusy(true);
    try {
      const r = await api.fn('process-follow-ups', { limit: 50 });
      if (r.action === 'quiet_hours_reschedule') toast('Quiet hours: ' + r.rescheduled + ' reportés', 'warn');
      else toast('Traités: ' + (r.sent_ok || 0) + ' / Erreurs: ' + (r.errors || 0));
      loadPending();
    } catch (e) { toast(e.message, 'error'); }
    finally { setProcessBusy(false); }
  };

  return (<div className="space-y-4">
    <Card className="p-4 space-y-3">
      <p className="font-semibold text-slate-900">Planifier en lot</p>
      <div className="grid grid-cols-2 gap-3">
        <Input label="Step" value={form.step} onChange={v => setForm({ ...form, step: v })} type="number"/>
        <Input label="Délai (jours)" value={form.delay} onChange={v => setForm({ ...form, delay: v })} type="number"/>
      </div>
      <TextArea label="Message" value={form.template} onChange={v => setForm({ ...form, template: v })} placeholder="Bonjour, juste un suivi..." rows={3}/>
      <div className="grid grid-cols-2 gap-3">
        <Input label="Tier (opt.)" value={form.tier} onChange={v => setForm({ ...form, tier: v })} placeholder="A - Hot Lead"/>
        <Input label="Min. jours" value={form.minDays} onChange={v => setForm({ ...form, minDays: v })} type="number"/>
      </div>
      <Input label="Pipeline stage (opt.)" value={form.stage} onChange={v => setForm({ ...form, stage: v })} placeholder="Contacted"/>
      <div className="flex gap-2">
        <Button variant="secondary" onClick={dryRun} disabled={busy} className="flex-1">Aperçu</Button>
        <Button onClick={commit} disabled={busy || !preview || preview.length === 0} className="flex-1">Planifier{preview ? ' (' + preview.length + ')' : ''}</Button>
      </div>
      {preview && <div className="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg">{preview.length} leads correspondent.</div>}
    </Card>
    <Card className="p-4">
      <div className="flex items-center justify-between mb-3">
        <p className="font-semibold text-slate-900">En attente ({pending.length})</p>
        <Button variant="secondary" onClick={processNow} disabled={processBusy}><IconSend className="w-4 h-4"/>{processBusy ? '...' : 'Lancer'}</Button>
      </div>
      <div className="space-y-2 max-h-96 overflow-y-auto">
        {pending.length === 0 && <p className="text-sm text-slate-500 text-center py-4">Aucun follow-up en attente</p>}
        {pending.map(p => (
          <div key={p.follow_up_id} className="p-3 bg-slate-50 rounded-lg">
            <div className="flex items-center justify-between gap-2">
              <p className="font-medium text-sm text-slate-900 truncate">{p.company_name || p.phone_e164}</p>
              <Badge color={p.status === 'due' ? 'rose' : 'indigo'}>S{p.step} · {p.status}</Badge>
            </div>
            <p className="text-xs text-slate-500 mt-1">{fmtDate(p.scheduled_at)}</p>
          </div>
        ))}
      </div>
    </Card>
  </div>);
}

function ConversationsTab({ api, toast }) {
  const [phone, setPhone] = useState('');
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [reply, setReply] = useState('');
  const [sending, setSending] = useState(false);
  const [searched, setSearched] = useState(false);

  const search = async () => {
    if (!phone) return;
    setLoading(true); setSearched(true);
    try { setMessages(await api.rest('/messages_log?phone_e164=eq.' + encodeURIComponent(phone) + '&order=timestamp.asc&limit=200') || []); }
    catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };
  const sendReply = async () => {
    if (!reply || !phone) return;
    setSending(true);
    try { await api.fn('send-sms', { phone_e164: phone, body: reply }); setReply(''); await search(); toast('Envoyé'); }
    catch (e) { toast(e.message, 'error'); }
    finally { setSending(false); }
  };

  return (<div className="space-y-4">
    <Card className="p-4">
      <div className="flex gap-2">
        <div className="flex-1"><Input value={phone} onChange={setPhone} placeholder="+15145551234"/></div>
        <Button onClick={search} disabled={loading || !phone}>Chercher</Button>
      </div>
    </Card>
    {loading && <div className="p-8 text-center text-slate-500">Chargement...</div>}
    {!loading && messages.length > 0 && (<>
      <div className="space-y-2">
        {messages.map(m => (
          <div key={m.id} className={'flex ' + (m.direction === 'outbound' ? 'justify-end' : 'justify-start')}>
            <div className={'max-w-xs px-4 py-2 rounded-2xl ' + (m.direction === 'outbound' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200')}>
              <p className="text-sm whitespace-pre-wrap">{m.body}</p>
              <p className={'text-xs mt-1 ' + (m.direction === 'outbound' ? 'text-indigo-200' : 'text-slate-400')}>{fmtDate(m.timestamp)} · {m.status || '—'}</p>
            </div>
          </div>
        ))}
      </div>
      <Card className="p-3">
        <div className="flex gap-2">
          <div className="flex-1"><Input value={reply} onChange={setReply} placeholder="Réponse..."/></div>
          <Button onClick={sendReply} disabled={sending || !reply}><IconSend className="w-4 h-4"/></Button>
        </div>
      </Card>
    </>)}
    {!loading && searched && phone && messages.length === 0 && <Card className="p-8 text-center text-slate-500">Aucun message pour ce numéro</Card>}
  </div>);
}

function OptOutsTab({ api, toast }) {
  const [list, setList] = useState([]);
  const [phone, setPhone] = useState('');
  const [reason, setReason] = useState('manual');
  const [busy, setBusy] = useState(false);

  const load = useCallback(async () => {
    try { setList(await api.rest('/opt_outs?select=*&order=opted_out_at.desc&limit=200') || []); }
    catch (e) { toast(e.message, 'error'); }
  }, [api]);
  useEffect(() => { load(); }, [load]);

  const add = async () => {
    if (!phone) return;
    setBusy(true);
    try { await api.rpc('add_manual_opt_out', { p_phone: phone, p_reason: reason }); setPhone(''); toast('Ajouté'); load(); }
    catch (e) { toast(e.message, 'error'); }
    finally { setBusy(false); }
  };
  const remove = async (p) => {
    if (!confirm('Retirer ' + p + '?')) return;
    try { await api.rpc('remove_opt_out', { p_phone: p }); toast('Retiré'); load(); }
    catch (e) { toast(e.message, 'error'); }
  };

  return (<div className="space-y-4">
    <Card className="p-4 space-y-3">
      <p className="font-semibold text-slate-900">Ajouter manuellement</p>
      <Input value={phone} onChange={setPhone} placeholder="+15145551234"/>
      <Input value={reason} onChange={setReason} placeholder="Raison"/>
      <Button onClick={add} disabled={busy || !phone} className="w-full">Ajouter</Button>
    </Card>
    <Card className="p-4">
      <p className="font-semibold text-slate-900 mb-3">Liste ({list.length})</p>
      <div className="space-y-2 max-h-96 overflow-y-auto">
        {list.map(o => (
          <div key={o.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg">
            <div className="flex-1 min-w-0">
              <p className="font-mono text-sm text-slate-900">{o.phone_e164}</p>
              <p className="text-xs text-slate-500">{o.reason || '—'} · {fmtRelative(o.opted_out_at)}</p>
            </div>
            <button onClick={() => remove(o.phone_e164)} className="p-2 text-rose-600 hover:bg-rose-50 rounded-lg"><IconTrash className="w-4 h-4"/></button>
          </div>
        ))}
      </div>
    </Card>
  </div>);
}

function ActivityTab({ api, toast }) {
  const [items, setItems] = useState([]);
  useEffect(() => {
    api.rest('/agent_activity?select=*&order=timestamp.desc.nullslast,created_at.desc&limit=100')
      .then(d => setItems(d || []))
      .catch(e => toast(e.message, 'error'));
  }, [api]);
  return (<div className="space-y-2">
    {items.length === 0 && <Card className="p-8 text-center text-slate-500">Aucune activité</Card>}
    {items.map(a => (
      <Card key={a.id} className="p-3">
        <div className="flex items-center justify-between">
          <p className="font-medium text-sm text-slate-900">{a.agent_name || 'system'}</p>
          <Badge color={a.status === 'ok' ? 'emerald' : a.status === 'failed' ? 'rose' : 'amber'}>{a.status || '—'}</Badge>
        </div>
        <p className="text-sm text-slate-600 mt-0.5">{a.action || '—'}{a.records_processed ? ' · ' + a.records_processed : ''}</p>
        <p className="text-xs text-slate-400 mt-1">{fmtRelative(a.timestamp || a.created_at)}</p>
      </Card>
    ))}
  </div>);
}

function BottomNav({ tab, onChange }) {
  const tabs = [
    { id: 'dashboard', label: 'Accueil', Icon: IconHome },
    { id: 'leads', label: 'Leads', Icon: IconUsers },
    { id: 'followups', label: 'Suivis', Icon: IconClock },
    { id: 'conversations', label: 'Convo', Icon: IconChat },
    { id: 'optouts', label: 'Opt-out', Icon: IconBan },
    { id: 'activity', label: 'Logs', Icon: IconActivity },
  ];
  return (<nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 py-2 z-40" style={{ paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
    <div className="max-w-4xl mx-auto flex justify-around">
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} className={'flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg transition ' + (tab === t.id ? 'text-indigo-600' : 'text-slate-500')}>
          <t.Icon className="w-5 h-5"/>
          <span className="text-xs font-medium">{t.label}</span>
        </button>
      ))}
    </div>
  </nav>);
}

function App() {
  const [config, setConfig] = useState(() => {
    try { const s = sessionStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const [tab, setTab] = useState('dashboard');
  const [t, showToast, clearToast] = useToast();
  const api = useMemo(() => config ? makeApi(config.url, config.key) : null, [config]);

  const onConnect = (cfg) => { try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch {} setConfig(cfg); };
  const onDisconnect = () => { try { sessionStorage.removeItem(STORAGE_KEY); } catch {} setConfig(null); };

  if (!config) return <><Login onConnect={onConnect}/><Toast {...t} onDone={clearToast}/></>;

  return (<div className="min-h-screen pb-24">
    <Toast {...t} onDone={clearToast}/>
    <header className="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-30">
      <div className="max-w-4xl mx-auto flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-4 h-4"/></div>
          <h1 className="font-bold text-slate-900">SMS Dashboard</h1>
        </div>
        <button onClick={onDisconnect} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><IconLogOut className="w-5 h-5"/></button>
      </div>
    </header>
    <main className="max-w-4xl mx-auto p-4">
      {tab === 'dashboard' && <Dashboard api={api} toast={showToast}/>}
      {tab === 'leads' && <LeadsTab api={api} toast={showToast}/>}
      {tab === 'followups' && <FollowUpsTab api={api} toast={showToast}/>}
      {tab === 'conversations' && <ConversationsTab api={api} toast={showToast}/>}
      {tab === 'optouts' && <OptOutsTab api={api} toast={showToast}/>}
      {tab === 'activity' && <ActivityTab api={api} toast={showToast}/>}
    </main>
    <BottomNav tab={tab} onChange={setTab}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
