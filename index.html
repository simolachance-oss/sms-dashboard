function makeApi(url, key) {
  const base = url.replace(/\/$/, '');
  const h = { apikey: key, Authorization: 'Bearer ' + key, 'Content-Type': 'application/json' };
  return {
    rest: async (path, opts) => {
      opts = opts || {};
      const r = await fetch(base + '/rest/v1' + path, { ...opts, headers: { ...h, ...(opts.headers || {}) } });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    fn: async (name, body) => {
      const r = await fetch(base + '/functions/v1/' + name, { method: 'POST', headers: h, body: JSON.stringify(body || {}) });
      const text = await r.text();
      let data = null; try { data = JSON.parse(text); } catch {}
      if (!r.ok) throw new Error((data && data.error) || text || r.statusText);
      return data;
    },
    rpc: async (name, args) => {
      const r = await fetch(base + '/rest/v1/rpc/' + name, { method: 'POST', headers: h, body: JSON.stringify(args || {}) });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    insert: async (table, row) => {
      const r = await fetch(base + '/rest/v1/' + table, { method: 'POST', headers: { ...h, Prefer: 'return=representation' }, body: JSON.stringify(row) });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    update: async (table, filter, patch) => {
      const r = await fetch(base + '/rest/v1/' + table + '?' + filter, { method: 'PATCH', headers: { ...h, Prefer: 'return=representation' }, body: JSON.stringify(patch) });
      const text = await r.text();
      if (!r.ok) throw new Error(text || r.statusText);
      return text ? JSON.parse(text) : null;
    },
    download: async (path, filename) => {
      const r = await fetch(base + '/rest/v1' + path, { headers: { ...h, Accept: 'text/csv' } });
      if (!r.ok) throw new Error(await r.text());
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    },
  };
}

const IconPlus = (p) => <Icon {...p} d="M12 5v14 M5 12h14"/>;

function Card({ children, className }) { return <div className={'bg-white rounded-2xl shadow-sm border border-slate-200 ' + (className || '')}>{children}</div>; }
function Button({ children, onClick, variant, disabled, className, size }) {
  const base = 'inline-flex items-center justify-center gap-2 rounded-xl font-medium transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ';
  const sz = size === 'sm' ? 'px-3 py-1.5 text-xs' : 'px-4 py-2.5 text-sm';

  return <button type="button" onClick={onClick} disabled={disabled} className={base + sz + ' ' + (styles[variant || 'primary']) + ' ' + (className || '')}>{children}</button>;
}
function Input({ value, onChange, placeholder, type, label, helper, autoFocus }) {
  return (<label className="block">{label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}<input type={type || 'text'} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus} className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base"/>{helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}</label>);
}
function TextArea({ value, onChange, placeholder, label, rows, helper, mono }) {
  return (<label className="block">{label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}<textarea value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows || 3} className={'w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base resize-none ' + (mono ? 'font-mono text-sm' : '')}/>{helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}</label>);
}
function Select({ value, onChange, label, options, helper }) {
  return (<label className="block">{label && <span className="text-sm font-medium text-slate-700 mb-1 block">{label}</span>}<select value={value || ''} onChange={e => onChange(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-base bg-white">{options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select>{helper && <span className="text-xs text-slate-500 mt-1 block">{helper}</span>}</label>);
}
function Toggle({ checked, onChange, label, helper }) {
  return (<div className="flex items-center justify-between gap-3"><div className="flex-1"><p className="text-sm font-medium text-slate-700">{label}</p>{helper && <p className="text-xs text-slate-500">{helper}</p>}</div><button onClick={() => onChange(!checked)} className={'relative w-11 h-6 rounded-full transition shrink-0 ' + (checked ? 'bg-indigo-600' : 'bg-slate-300')}><span className={'absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition transform ' + (checked ? 'translate-x-5' : '')}/></button></div>);
}
function Badge({ children, color }) {
  const colors = { indigo: 'bg-indigo-100 text-indigo-700', emerald: 'bg-emerald-100 text-emerald-700', amber: 'bg-amber-100 text-amber-700', rose: 'bg-rose-100 text-rose-700', slate: 'bg-slate-100 text-slate-700', violet: 'bg-violet-100 text-violet-700' };
  return <span className={'inline-block px-2 py-0.5 rounded-md text-xs font-medium ' + (colors[color || 'slate'])}>{children}</span>;
}
function Toast({ msg, kind, onDone }) {
  useEffect(() => { if (msg) { const t = setTimeout(onDone, 4000); return () => clearTimeout(t); } }, [msg]);
  if (!msg) return null;
  const bg = kind === 'error' ? 'bg-rose-600' : kind === 'warn' ? 'bg-amber-600' : 'bg-emerald-600';
  return <div className={'fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-xl text-white shadow-lg ' + bg + ' max-w-md text-sm'}>{msg}</div>;
}
function Modal({ open, onClose, title, children, size }) {
  if (!open) return null;
  const w = size === 'lg' ? 'max-w-2xl' : 'max-w-md';
  return (<div className="fixed inset-0 z-50 bg-slate-900/50 flex items-end sm:items-center justify-center" onClick={onClose}><div className={'bg-white w-full ' + w + ' max-h-[90vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl p-5'} onClick={e => e.stopPropagation()}><div className="flex items-center justify-between mb-4 sticky top-0 bg-white -mx-5 px-5 -mt-5 pt-5 pb-2 border-b border-slate-100 z-10"><h2 className="text-lg font-bold text-slate-900">{title}</h2><button onClick={onClose} className="p-1 text-slate-400"><IconX/></button></div>{children}</div></div>);
}
function Skeleton({ rows, h }) { const n = rows || 3; const height = h || 'h-16'; return (<div className="space-y-2">{Array.from({ length: n }).map((_, i) => <div key={i} className={'skeleton rounded-xl ' + height}/>)}</div>); }

function fmtDate(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleString('fr-CA', { dateStyle: 'short', timeStyle: 'short' }); }
function fmtRelative(s) { if (!s) return '—'; const d = new Date(s); const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return 'maintenant'; if (diff < 3600) return Math.floor(diff/60) + ' min'; if (diff < 86400) return Math.floor(diff/3600) + ' h'; return Math.floor(diff/86400) + ' j'; }
function fmtCost(n) { if (n == null) return '—'; return '$' + parseFloat(n).toFixed(4); }
function tierColor(t) { if (!t) return 'slate'; if (t.startsWith('A')) return 'rose'; if (t.startsWith('B')) return 'amber'; if (t.startsWith('C')) return 'indigo'; return 'slate'; }
function sentColor(s) { return s === 'interested' || s === 'positive' ? 'emerald' : s === 'hostile' ? 'rose' : s === 'not_interested' ? 'amber' : 'slate'; }
function stageOptions() { return [{value:'',label:'—'},{value:'New',label:'New'},{value:'Contacted',label:'Contacted'},{value:'Replied',label:'Replied'},{value:'Engaged',label:'Engaged'},{value:'Booked',label:'Booked'},{value:'Won',label:'Won'},{value:'Lost',label:'Lost'},{value:'Disqualified',label:'Disqualified'}]; }
function tierOptions() { return [{value:'',label:'—'},{value:'A - Hot Lead',label:'A - Hot Lead'},{value:'B - Warm Lead',label:'B - Warm Lead'},{value:'C - Cold Lead',label:'C - Cold Lead'},{value:'D - Filler Lead',label:'D - Filler Lead'}]; }
function useToast() { const [t, setT] = useState({ msg: '', kind: 'ok' }); return [t, (msg, kind) => setT({ msg, kind: kind || 'ok' }), () => setT({ msg: '', kind: 'ok' })]; }

function Login({ onConnect }) {
  const [key, setKey] = useState(''); const [busy, setBusy] = useState(false); const [err, setErr] = useState('');
  const submit = async () => { setErr(''); setBusy(true); try { const api = makeApi(SUPABASE_URL, key); await api.rest('/v_pipeline_stats?select=*&limit=1'); onConnect({ url: SUPABASE_URL, key }); } catch { setErr('Connexion échouée.'); } finally { setBusy(false); } };
  return (<div className="min-h-screen flex items-center justify-center p-4"><Card className="w-full max-w-md p-6"><div className="flex items-center gap-3 mb-1"><div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-6 h-6"/></div><div><h1 className="text-xl font-bold text-slate-900">SMS Dashboard</h1><p className="text-xs text-slate-500">LeadsWebsite</p></div></div><p className="text-sm text-slate-600 mb-5 mt-3">Entre ta clé service_role.</p><div className="space-y-3"><Input label="Service Role Key" type="password" value={key} onChange={setKey} placeholder="eyJhbGc..."/>{err && <div className="text-sm text-rose-600 bg-rose-50 px-3 py-2 rounded-lg">{err}</div>}<Button onClick={submit} disabled={busy || !key} className="w-full">{busy ? '...' : 'Se connecter'}</Button></div></Card></div>);
}

function SearchModal({ open, onClose, api, toast, onSelectLead }) {
  const [q, setQ] = useState(''); const [results, setResults] = useState([]); const [loading, setLoading] = useState(false);
  useEffect(() => { if (!open) { setQ(''); setResults([]); } }, [open]);
  useEffect(() => {
    if (!q || q.length < 2) { setResults([]); return; }
    const t = setTimeout(async () => {
      setLoading(true);
      try {
        let path = '/leads?select=id,company_name,contact_name,phone_e164,priority_tier,pipeline_stage&limit=15';
        if (q.startsWith('+') || /^\d/.test(q)) path += '&phone_e164=ilike.*' + encodeURIComponent(q) + '*';
        else path += '&or=(company_name.ilike.*' + encodeURIComponent(q) + '*,contact_name.ilike.*' + encodeURIComponent(q) + '*)';
        setResults(await api.rest(path) || []);
      } catch (e) { toast(e.message, 'error'); } finally { setLoading(false); }
    }, 250);
    return () => clearTimeout(t);
  }, [q]);
  if (!open) return null;
  return (<div className="fixed inset-0 z-50 bg-slate-900/60 flex items-start justify-center pt-16 px-4" onClick={onClose}><div className="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden" onClick={e => e.stopPropagation()}><div className="p-3 border-b"><div className="flex items-center gap-2 px-3"><IconSearch className="w-4 h-4 text-slate-400"/><input value={q} onChange={e => setQ(e.target.value)} placeholder="Recherche entreprise, contact, tél..." autoFocus className="flex-1 py-2 outline-none text-sm"/></div></div><div className="max-h-96 overflow-y-auto">{loading && <div className="p-4 text-center text-sm text-slate-500">Recherche...</div>}{!loading && q.length >= 2 && results.length === 0 && <div className="p-4 text-center text-sm text-slate-500">Aucun résultat</div>}{results.map(r => (<button key={r.id} onClick={() => { onSelectLead(r); onClose(); }} className="w-full text-left p-3 hover:bg-slate-50 border-b border-slate-100"><p className="font-medium text-sm text-slate-900 truncate">{r.company_name || '(Sans nom)'}</p><p className="text-xs text-slate-500">{r.contact_name || '—'} · {r.phone_e164}</p></button>))}</div></div></div>);
}

function FieldRow({ k, v }) { return (<div className="flex items-start justify-between gap-3 py-1"><span className="text-slate-500 text-xs shrink-0">{k}</span><span className="text-slate-900 text-right break-words text-sm">{v || '—'}</span></div>); }
function LeadDetailModal({ open, lead, onClose, api, toast, onUpdated }) {
  const [data, setData] = useState(null); const [edit, setEdit] = useState({}); const [editing, setEditing] = useState(false); const [busy, setBusy] = useState(false); const [history, setHistory] = useState([]); const [suggs, setSuggs] = useState([]);
  const reload = useCallback(async () => {
    if (!lead) return;
    try {
      const [l, msgs, sugg] = await Promise.all([
        api.rest('/leads?id=eq.' + lead.id + '&select=*&limit=1'),
        api.rest('/messages_log?lead_id=eq.' + lead.id + '&select=*&order=timestamp.asc&limit=50'),
        api.rest('/reply_suggestions?lead_id=eq.' + lead.id + '&select=*&order=created_at.desc&limit=10'),
      ]);
      if (l && l[0]) { setData(l[0]); setEdit(l[0]); }
      setHistory(msgs || []); setSuggs(sugg || []);
    } catch (e) { toast(e.message, 'error'); }
  }, [lead, api]);
  useEffect(() => { if (open) { setData(null); setHistory([]); setSuggs([]); setEditing(false); reload(); } }, [open, reload]);
  const save = async () => {
    setBusy(true);
    try {
      const patch = {};
      ['company_name','contact_name','personalized_hook','site_notes','priority_tier','pipeline_stage','overall_need_score','website','email'].forEach(k => { if (edit[k] !== data[k]) patch[k] = edit[k] || null; });
      if (Object.keys(patch).length === 0) { setEditing(false); return; }
      await api.update('leads', 'id=eq.' + lead.id, patch);
      toast('Sauvegardé'); setEditing(false); reload(); onUpdated && onUpdated();
    } catch (e) { toast(e.message, 'error'); } finally { setBusy(false); }
  };

  </div>);

// ============ NEW MESSENGER-STYLE CONVERSATIONS ============
function ConversationsTab({ api, toast, openLead }) {
  const PAGE = 50;
  const [search, setSearch] = useState('');
  const [conversations, setConversations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadingMore, setLoadingMore] = useState(false);
  const [hasMore, setHasMore] = useState(false);
  const [selectedPhone, setSelectedPhone] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let path = '/v_conversations?select=*&limit=' + (PAGE + 1);
      if (search) {
        if (search.startsWith('+') || /^\d/.test(search)) path += '&phone_e164=ilike.*' + encodeURIComponent(search) + '*';
        else path += '&display_name=ilike.*' + encodeURIComponent(search) + '*';
      }
      const r = await api.rest(path) || [];
      setConversations(r.slice(0, PAGE));
      setHasMore(r.length > PAGE);
    } catch (e) { toast(e.message, 'error'); } finally { setLoading(false); }
  }, [api, search]);

  useEffect(() => {
    const t = setTimeout(load, search ? 250 : 0);
    return () => clearTimeout(t);
  }, [load]);

  const loadMore = async () => {
    if (loadingMore || conversations.length === 0) return;
    setLoadingMore(true);
    try {
      const oldestTs = conversations[conversations.length - 1].last_ts;
      let path = '/v_conversations?select=*&last_ts=lt.' + encodeURIComponent(oldestTs) + '&limit=' + (PAGE + 1);
      if (search) {
        if (search.startsWith('+') || /^\d/.test(search)) path += '&phone_e164=ilike.*' + encodeURIComponent(search) + '*';
        else path += '&display_name=ilike.*' + encodeURIComponent(search) + '*';
      }
      const r = await api.rest(path) || [];
      setConversations(prev => [...prev, ...r.slice(0, PAGE)]);
      setHasMore(r.length > PAGE);
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoadingMore(false); }
  };

  if (selectedPhone) {
    return <ConversationThread phone={selectedPhone} api={api} toast={toast} openLead={openLead} onBack={() => { setSelectedPhone(null); load(); }}/>;
  }

  return (<div className="space-y-3">
    <Input value={search} onChange={setSearch} placeholder="Rechercher par nom ou numéro..."/>
    {loading && conversations.length === 0 && <Skeleton rows={5} h="h-16"/>}
    {!loading && conversations.length === 0 && (<Card className="p-8 text-center text-slate-500"><IconChat className="w-12 h-12 mx-auto mb-2 text-slate-300"/><p>{search ? 'Aucune conversation correspondante' : 'Aucune conversation'}</p></Card>)}
    <div className="space-y-1">{conversations.map(c => {
      const cleaned = (c.display_name || '?').replace(/[^A-Za-z0-9À-ÿ\s]/g, '').trim();
      const parts = cleaned.split(/\s+/).filter(Boolean);
      const initials = (parts.length >= 2 ? parts[0][0] + parts[1][0] : (parts[0] || '?').slice(0, 2)).toUpperCase();
      const isUnread = c.has_unread;
      const avatarColor = isUnread ? 'bg-emerald-500' : (c.priority_tier && c.priority_tier.startsWith('A') ? 'bg-rose-500' : c.priority_tier && c.priority_tier.startsWith('B') ? 'bg-amber-500' : 'bg-indigo-500');
      return (<Card key={c.phone_e164} className="overflow-hidden"><button onClick={() => setSelectedPhone(c.phone_e164)} className="w-full text-left p-3 flex items-center gap-3 hover:bg-slate-50 active:bg-slate-100 transition"><div className={'w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0 ' + avatarColor}>{initials}</div><div className="flex-1 min-w-0"><div className="flex items-center justify-between gap-2 mb-0.5"><p className={'truncate text-slate-900 ' + (isUnread ? 'font-bold' : 'font-semibold')}>{c.display_name}</p><span className={'text-xs shrink-0 ' + (isUnread ? 'text-emerald-600 font-semibold' : 'text-slate-500')}>{fmtRelative(c.last_ts)}</span></div><div className="flex items-center justify-between gap-2"><p className={'text-sm truncate ' + (isUnread ? 'text-slate-900 font-medium' : 'text-slate-500')}>{c.last_direction === 'outbound' && <span className="text-slate-400">Vous: </span>}{c.last_body || '(message vide)'}</p>{isUnread && <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 shrink-0"/>}</div>{(c.priority_tier || c.pipeline_stage) && (<div className="flex gap-1 mt-1.5">{c.priority_tier && <Badge color={tierColor(c.priority_tier)}>{c.priority_tier.split(' - ')[0]}</Badge>}{c.pipeline_stage && <Badge color="slate">{c.pipeline_stage}</Badge>}{c.reply_status === 'opt-out' && <Badge color="rose">Opt-out</Badge>}</div>)}</div></button></Card>);
    })}</div>
    {hasMore && !loading && (<div className="text-center pt-2"><Button variant="secondary" size="sm" onClick={loadMore} disabled={loadingMore}>{loadingMore ? '...' : 'Charger plus'}</Button></div>)}
  </div>);
}

function ConversationThread({ phone, api, toast, openLead, onBack }) {
  const PAGE = 100;
  const [messages, setMessages] = useState([]);
  const [suggestions, setSuggestions] = useState([]);
  const [lead, setLead] = useState(null);
  const [loading, setLoading] = useState(true);
  const [hasMoreOlder, setHasMoreOlder] = useState(false);
  const [loadingOlder, setLoadingOlder] = useState(false);
  const [reply, setReply] = useState('');
  const [sending, setSending] = useState(false);
  const scrollRef = useRef(null);
  const lastMsgIdRef = useRef(null);

  const load = useCallback(async (silent) => {
    if (!silent) setLoading(true);
    try {
      const [msgs, sugg, leads] = await Promise.all([
        api.rest('/messages_log?phone_e164=eq.' + encodeURIComponent(phone) + '&order=timestamp.desc&limit=' + (PAGE + 1)),
        api.rest('/reply_suggestions?phone_e164=eq.' + encodeURIComponent(phone) + '&select=*&order=created_at.desc&limit=10'),
        api.rest('/leads?phone_e164=eq.' + encodeURIComponent(phone) + '&select=id,company_name,contact_name,priority_tier,pipeline_stage,reply_status&order=created_at.desc&limit=1'),
      ]);
      const fresh = (msgs || []).slice(0, PAGE).reverse();
      const more = (msgs || []).length > PAGE;
      // Merge with already-loaded older pages on silent polls so the user doesn't lose context.
      setMessages(prev => {
        if (!silent || prev.length === 0) return fresh;
        const freshIds = new Set(fresh.map(m => m.id));
        const olderKept = prev.filter(m => !freshIds.has(m.id) && new Date(m.timestamp) < new Date(fresh[0]?.timestamp || 0));
        return [...olderKept, ...fresh];
      });
      if (!silent) setHasMoreOlder(more);
      setSuggestions(sugg || []);
      setLead((leads && leads[0]) || null);
    } catch (e) { if (!silent) toast(e.message, 'error'); } finally { setLoading(false); }
  }, [phone, api, toast]);

  const loadOlder = async () => {
    if (loadingOlder || messages.length === 0) return;
    setLoadingOlder(true);
    try {
      const oldestTs = messages[0].timestamp;
      const older = await api.rest(

      const prevHeight = el?.scrollHeight ?? 0;
      const prevTop = el?.scrollTop ?? 0;
      setMessages(prev => [...fetched, ...prev]);
      requestAnimationFrame(() => { if (el) el.scrollTop = prevTop + (el.scrollHeight - prevHeight); });
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoadingOlder(false); }

    <div ref={scrollRef} className="flex-1 overflow-y-auto py-4 space-y-1 scrollbar-thin">
      {loading && <div className="py-4"><Skeleton rows={3} h="h-12"/></div>}
      {!loading && messages.length === 0 && (<div className="text-center text-slate-500 py-12"><IconChat className="w-12 h-12 mx-auto mb-2 text-slate-300"/><p className="text-sm">Aucun message</p></div>)}

      {messages.map((m, i) => {

        const isOut = m.direction === 'outbound';

  const onDisconnect = () => { try { sessionStorage.removeItem(STORAGE_KEY); } catch {} setConfig(null); };
  if (!config) return <><Login onConnect={onConnect}/><Toast {...t} onDone={clearToast}/></>;
  return (<div className="min-h-screen pb-24">
    <Toast {...t} onDone={clearToast}/>
    <header className="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-20"><div className="max-w-4xl mx-auto flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white"><IconChat className="w-4 h-4"/></div><h1 className="font-bold text-slate-900">SMS Dashboard</h1></div><div className="flex items-center gap-1"><button onClick={() => setShowSearch(true)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg" title="Recherche (⌘K)"><IconSearch className="w-5 h-5"/></button><button onClick={() => setShowSettings(true)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><IconSettings className="w-5 h-5"/></button><button onClick={onDisconnect} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><IconLogOut className="w-5 h-5"/></button></div></div></header>
    <main className="max-w-4xl mx-auto p-4">{showSettings ? <SettingsPage api={api} toast={showToast} onBack={() => setShowSettings(false)}/> : (<>{tab === 'dashboard' && <Dashboard api={api} toast={showToast} openLead={setDetailLead}/>}{tab === 'leads' && <LeadsTab api={api} toast={showToast} openLead={setDetailLead}/>}{tab === 'campaigns' && <CampaignsTab api={api} toast={showToast}/>}{tab === 'conversations' && <ConversationsTab api={api} toast={showToast} openLead={setDetailLead}/>}{tab === 'suggestions' && <SuggestionsTab api={api} toast={showToast}/>}{tab === 'plus' && <PlusTab api={api} toast={showToast} openLead={setDetailLead}/>}</>)}</main>
    {!showSettings && <BottomNav tab={tab} onChange={setTab} suggCount={suggCount}/>}
    <SearchModal open={showSearch} onClose={() => setShowSearch(false)} api={api} toast={showToast} onSelectLead={setDetailLead}/>
    <LeadDetailModal open={!!detailLead} lead={detailLead} onClose={() => setDetailLead(null)} api={api} toast={showToast}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
